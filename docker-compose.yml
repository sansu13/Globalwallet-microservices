
services:

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: globalwallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ewxg1528
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    container_name: user_service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  transaction-service:
    build: ./transaction-service
    container_name: transaction_service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: always

  python_worker:
    build: ./python_work
    container_name: python_worker
    depends_on:
      postgres:
        condition: service_healthy
    restart: always